pre-commit:
  parallel: false
  commands:
    prettier:
      priority: 1
      glob: "*.{js,jsx,ts,tsx,json,md,css,scss}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true

    eslint:
      priority: 2
      glob: "*.{js,jsx,ts,tsx}"
      run: pnpm eslint --max-warnings=0 {staged_files}

pre-push:
  commands:
    typecheck:
      run: pnpm tsc --noEmit
